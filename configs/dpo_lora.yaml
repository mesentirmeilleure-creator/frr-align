model:
  name: Qwen/Qwen2.5-0.5B-Instruct
  dtype: bfloat16
  device_map: auto
  trust_remote_code: false

data:
  train_path: data/dpo/dpo_pairs_v1_4models.jsonl
  eval_ratio: 0.1
  use_chat_template: true

lora:
  rank: 16
  alpha: 32
  dropout: 0.05
  bias: none
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  output_dir: outputs/dpo_qwen25_05b_lora_v1
  beta: 0.1
  learning_rate: 5.0e-6
  num_train_epochs: 3
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  warmup_ratio: 0.03
  max_length: 1024
  logging_steps: 10
  eval_steps: 50
  save_steps: 50
  save_strategy: steps
  save_total_limit: 2
  gradient_checkpointing: true
  bf16: true
  fp16: false
  report_to: none
  seed: 42
  resume_from_checkpoint:
